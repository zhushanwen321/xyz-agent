<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subagent/Workflow 管理面板 — xyz-agent v3</title>
<style>
  :root {
    --bg: #1a1b1f;
    --surface: #222329;
    --surface-hover: #2d2e36;
    --surface-2: #282930;
    --bg-elevated: #2a2b32;
    --bg-input: #1e1f24;
    --fg: #f7f8fc;
    --muted: #a8a8b5;
    --subtle: #82828f;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --accent: #4f8ef7;
    --accent-hover: #6ba3ff;
    --accent-soft: rgba(79,142,247,0.12);
    --accent-ring: rgba(79,142,247,0.30);
    --success: #22c55e;
    --warning: #f5a524;
    --danger: #ef4444;
    --reasoning: #a78bfa;
    --radius-sm: 3px;
    --radius: 8px;
    --radius-lg: 12px;
    --font-sans: Inter, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --duration-fast: 120ms;
    --duration: 200ms;
    --duration-slow: 320ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }

  /* ── App Shell ── */
  .app-shell {
    display: flex;
    height: 100vh;
    padding: 12px;
    gap: 12px;
  }

  /* ── Sidebar (340px, transparent, blends into bg) ── */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    padding-top: 52px;
    display: flex;
    flex-direction: column;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 8px 14px;
  }
  .sidebar-brand .logo {
    width: 22px; height: 22px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-brand .name { font-size: 13px; font-weight: 600; color: var(--fg); }
  .sidebar-brand .ver { font-size: 10px; color: var(--muted); }

  .nav-actions {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 0 4px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--duration-fast);
    font-size: 12px;
    color: var(--muted);
    border: none;
    background: transparent;
    text-align: left;
    width: 100%;
  }
  .nav-btn:hover { background: var(--surface-hover); color: var(--fg); }
  .nav-btn .icon { width: 15px; height: 15px; flex-shrink: 0; color: var(--subtle); }
  .nav-btn:hover .icon { color: var(--muted); }
  .nav-btn .kbd {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    padding: 1px 5px;
    border-radius: var(--radius-sm);
  }

  .nav-divider {
    margin: 8px 10px;
    height: 1px;
    background: var(--border);
  }

  /* Overview button */
  .overview-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    margin: 0 4px 4px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--duration-fast);
    font-size: 12px;
    color: var(--muted);
    border: none;
    background: transparent;
    text-align: left;
    width: calc(100% - 8px);
  }
  .overview-btn:hover { background: var(--surface-hover); color: var(--fg); }
  .overview-btn .icon { width: 15px; height: 15px; flex-shrink: 0; color: var(--subtle); }
  .overview-btn .count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
  }

  /* ── SegmentedTab (4 icon-only tabs, equal width) ── */
  .segmented-tab {
    display: flex;
    gap: 2px;
    padding: 0 4px 4px;
  }
  .seg-tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 5px 4px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--duration-fast);
    font-family: var(--font-sans);
    position: relative;
    min-width: 0;
  }
  .seg-tab:hover { background: var(--surface-hover); color: var(--fg); }
  .seg-tab.active {
    border-color: var(--border-strong);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .seg-tab .icon { width: 15px; height: 15px; flex-shrink: 0; }
  .seg-tab .count {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--subtle);
    line-height: 1;
  }
  .seg-tab.active .count { color: var(--accent); opacity: 0.8; }
  .seg-tab .badge-dot {
    position: absolute;
    top: 3px; right: 6px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── Sidebar Content Area ── */
  .sidebar-content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 4px 4px 0;
  }

  /* ── Task Card (subagent/workflow list item) ── */
  .task-card {
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: all var(--duration-fast);
    position: relative;
  }
  .task-card:hover {
    background: var(--surface-hover);
    border-color: var(--border);
  }
  .task-card.selected {
    background: var(--surface-2);
    border-color: transparent;
    box-shadow: inset 0 0 0 1px var(--accent-ring);
  }

  .task-card-header {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .task-status {
    width: 14px; height: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spinner-icon {
    width: 13px; height: 13px;
    color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  .spinner-icon.warn { color: var(--warning); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .status-dot.done { background: var(--success); }
  .status-dot.failed { background: var(--danger); }
  .status-dot.cancelled { background: var(--subtle); opacity: 0.5; }
  .status-dot.paused { background: var(--warning); }

  .task-name {
    flex: 1;
    min-width: 0;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--fg);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .task-name .slug {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--subtle);
    font-weight: 400;
    margin-left: 4px;
  }

  .task-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity var(--duration-fast);
  }
  .task-card:hover .task-actions { opacity: 1; }
  .task-card.selected .task-actions { opacity: 1; }

  .task-btn {
    height: 22px;
    min-width: 22px;
    padding: 0 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--muted);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 10px;
    font-family: var(--font-sans);
    transition: all var(--duration-fast);
  }
  .task-btn:hover { background: var(--surface-hover); color: var(--fg); }
  .task-btn.danger:hover { background: rgba(239,68,68,0.12); color: var(--danger); border-color: var(--danger); }
  .task-btn .icon { width: 11px; height: 11px; }

  .task-meta {
    margin-top: 3px;
    padding-left: 21px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    display: flex;
    gap: 6px;
  }
  .task-meta .sep { opacity: 0.4; }
  .task-task {
    margin-top: 1px;
    padding-left: 21px;
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Workflow progress bar */
  .wf-progress {
    margin-top: 4px;
    padding-left: 21px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wf-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--bg-input);
    border-radius: 2px;
    overflow: hidden;
  }
  .wf-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width var(--duration-slow) var(--ease);
  }
  .wf-progress-fill.done { background: var(--success); }
  .wf-progress-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    flex-shrink: 0;
  }

  .wf-chevron {
    width: 13px; height: 13px;
    color: var(--subtle);
    transition: transform var(--duration);
    flex-shrink: 0;
  }

  /* ── Sidebar View 2: Workflow Detail ── */
  .wf-back {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px 10px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: color var(--duration-fast);
  }
  .wf-back:hover { color: var(--accent); }
  .wf-back .icon { width: 14px; height: 14px; }
  .wf-back .title {
    font-weight: 600;
    color: var(--fg);
    margin-left: 4px;
  }

  .phase-group { margin-bottom: 8px; }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    font-size: 10.5px;
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .phase-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .phase-dot.done { background: var(--success); }
  .phase-dot.running { background: var(--accent); }
  .phase-dot.pending { background: var(--subtle); opacity: 0.4; }
  .phase-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    text-transform: none;
    letter-spacing: 0;
  }

  .agent-call {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    margin-bottom: 2px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all var(--duration-fast);
    border: 1px solid transparent;
  }
  .agent-call:hover {
    background: var(--surface-hover);
    border-color: var(--border);
  }
  .agent-call.selected {
    background: var(--surface-2);
    box-shadow: inset 0 0 0 1px var(--accent-ring);
  }
  .agent-icon {
    width: 16px; height: 16px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--fg);
  }
  .agent-name .model {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    font-weight: 400;
    margin-left: 4px;
  }
  .agent-summary {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    margin-top: 1px;
  }

  /* ── Empty State ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    padding: 20px;
    text-align: center;
  }
  .empty-state .icon { width: 28px; height: 28px; color: var(--subtle); opacity: 0.4; }
  .empty-state .text { font-size: 12px; color: var(--subtle); }
  .empty-state .hint { font-size: 11px; color: var(--subtle); opacity: 0.6; }

  /* ── Main Panel ── */
  .main-panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 38px;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-header .status-dot-lg {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--success);
  }
  .panel-header .spinner-lg {
    width: 13px; height: 13px;
    flex-shrink: 0;
    color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12.5px;
    min-width: 0;
  }
  .breadcrumb .dir {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--fg);
  }
  .breadcrumb .sep { color: var(--subtle); opacity: 0.5; }
  .breadcrumb .branch {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
  }
  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .header-btn {
    width: 26px; height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--duration-fast), color var(--duration-fast);
  }
  .header-btn:hover { background: var(--surface-hover); color: var(--fg); }
  .header-btn .icon { width: 15px; height: 15px; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px;
    margin-right: 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background var(--duration-fast), color var(--duration-fast);
  }
  .back-btn:hover { background: var(--surface-hover); color: var(--accent); }
  .back-btn .icon { width: 14px; height: 14px; }
  .sub-title {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--fg);
  }
  .sub-title .slug {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--subtle);
    font-weight: 400;
    margin-left: 4px;
  }

  .panel-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .msg-stream {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    min-width: 0;
  }
  .turn { padding: 0 20px; margin-bottom: 2px; }
  .turn-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 0 2px;
    font-size: 11px;
    color: var(--subtle);
  }
  .turn-meta .role { font-weight: 600; }
  .turn-meta .role.user { color: var(--muted); }
  .turn-meta .role.assistant { color: var(--accent); }
  .turn-body {
    padding-left: 20px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg);
  }
  .turn-body .thinking {
    margin: 4px 0;
    padding: 5px 10px;
    background: rgba(167,139,250,0.08);
    border-left: 2px solid var(--reasoning);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .tool-block {
    margin: 6px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: var(--surface-2);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--muted);
  }
  .tool-header .chevron {
    width: 12px; height: 12px;
    transition: transform var(--duration);
  }
  .tool-block.expanded .chevron { transform: rotate(90deg); }
  .tool-header .name { color: var(--accent); font-weight: 500; }
  .tool-content {
    padding: 8px 10px;
    background: var(--bg-input);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: none;
  }
  .tool-block.expanded .tool-content { display: block; }

  .composer-zone {
    padding: 8px 14px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .composer-box {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    min-height: 38px;
    color: var(--subtle);
    font-size: 13px;
    display: flex;
    align-items: center;
  }

  /* ── User footer ── */
  .user-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    margin-top: auto;
    font-size: 12px;
    color: var(--muted);
  }
  .user-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--success));
    flex-shrink: 0;
  }
  .settings-btn {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--subtle);
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-left: auto;
  }
  .settings-btn:hover { background: var(--surface-hover); color: var(--fg); }

  /* ── Scene tabs ── */
  .scene-tabs {
    display: flex;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto 16px;
    border-bottom: 1px solid var(--border);
  }
  .scene-tab {
    padding: 6px 14px;
    font-size: 12px;
    color: var(--subtle);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: color var(--duration-fast), border-color var(--duration-fast);
    font-family: var(--font-sans);
  }
  .scene-tab:hover { color: var(--muted); }
  .scene-tab.active { color: var(--accent); border-color: var(--accent); }

  .scenes-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
  }
</style>
</head>
<body>

<div class="scenes-container">
  <div class="scene-tabs">
    <button class="scene-tab active" data-scene="1">场景 1: subagent 列表 + 主对话流</button>
    <button class="scene-tab" data-scene="2">场景 2: 点击 subagent → Panel 切换对话流</button>
    <button class="scene-tab" data-scene="3">场景 3: workflow → phase → agent call</button>
    <button class="scene-tab" data-scene="4">场景 4: 空态</button>
  </div>

  <div class="app-shell" style="height:560px;padding:0">

  <!-- ═══════════════ Sidebar ═══════════════ -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">x</div>
      <div>
        <div class="name">xyz-agent</div>
        <div class="ver">v0.3.8 · pi v0.80.3</div>
      </div>
    </div>

    <div class="nav-actions">
      <button class="nav-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建任务
        <span class="kbd">⌘N</span>
      </button>
      <button class="nav-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        搜索
        <span class="kbd">⌘K</span>
      </button>
    </div>

    <div class="nav-divider"></div>

    <button class="overview-btn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      概览
      <span class="count">6</span>
    </button>

    <!-- SegmentedTab: 4 icon-only tabs (equal width, label in title) -->
    <div class="segmented-tab" id="seg-tabs">
      <button class="seg-tab" data-tab="sessions" title="会话">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

// ── Subagent card ──
function subagentCard(id, name, slug, status, meta, task) {
  const statusIcon = status === 'running' ? SPINNER_SM : `<div class="status-dot ${status}"></div>`;
  const actions = status === 'running'
    ? `<div class="task-actions"><button class="task-btn danger" data-action="cancel-${id}" title="取消">${ICON_CANCEL}Cancel</button></div>` : '';
  const sel = selectedTask === id ? 'selected' : '';
  return `<div class="task-card ${sel}" data-task="${id}">
    <div class="task-card-header">
      <div class="task-status">${statusIcon}</div>
      <div class="task-name">${name}<span class="slug">${slug}</span></div>
      ${actions}
    </div>
    <div class="task-meta">${meta}</div>
    <div class="task-task">${task}</div>
  </div>`;
}

// ── Workflow card ──
function workflowCard(id, name, slug, status, progress, meta) {
  const statusIcon = status === 'running' ? SPINNER_SM
    : status === 'paused' ? `<div class="status-dot paused"></div>`
    : `<div class="status-dot ${status}"></div>`;
  const actions = status === 'running'
    ? `<div class="task-actions"><button class="task-btn" data-action="pause-${id}" title="暂停">${ICON_PAUSE}Pause</button><button class="task-btn danger" data-action="abort-${id}" title="终止">${ICON_ABORT}Abort</button></div>`
    : status === 'paused'
    ? `<div class="task-actions"><button class="task-btn" data-action="resume-${id}" title="恢复">Resume</button><button class="task-btn danger" data-action="abort-${id}">${ICON_ABORT}Abort</button></div>`
    : '';
  const sel = selectedTask === id ? 'selected' : '';
  return `<div class="task-card ${sel}" data-task="${id}">
    <div class="task-card-header">
      <div class="task-status">${statusIcon}</div>
      <div class="task-name">${name}<span class="slug">${slug}</span></div>
      ${ICON_CHEVRON}
      ${actions}
    </div>
    <div class="wf-progress">
      <div class="wf-progress-bar"><div class="wf-progress-fill ${status==='done'?'done':''}" style="width:${progress}%"></div></div>
      <span class="wf-progress-text">${progress}%</span>
    </div>
    <div class="task-meta">${meta}</div>
  </div>`;
}

// ── Master render ──
function render() {
  // Update seg tab active states
  document.querySelectorAll('.seg-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });
  renderSidebar();
  renderMain();
  bindSidebarEvents();
  bindBackBtn();
}

function bindSidebarEvents() {
  // Task card click → select
  document.querySelectorAll('.task-card[data-task]').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't trigger card click if clicking a button inside
      if (e.target.closest('.task-btn')) return;
      const id = card.dataset.task;
      // Workflow card → enter detail view
      if (id === 'workflow-deploy' && !workflowDetailView) {
        workflowDetailView = true;
        render();
        return;
      }
      selectedTask = id;
      render();
    });
  });
  // Agent call click
  document.querySelectorAll('.agent-call[data-task]').forEach(call => {
    call.addEventListener('click', () => {
      selectedTask = call.dataset.task;
      render();
    });
  });
  // Workflow back button
  const wfBack = document.getElementById('wf-back');
  if (wfBack) {
    wfBack.addEventListener('click', (e) => {
      if (e.target.closest('.task-btn')) return;
      workflowDetailView = false;
      selectedTask = null;
      render();
    });
  }
  // Action buttons (cancel/pause/abort/resume)
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Demo: just flash
      btn.style.opacity = '0.4';
      setTimeout(() => btn.style.opacity = '', 200);
    });
  });
}

function bindBackBtn() {
  const backBtn = document.getElementById('back-btn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      selectedTask = null;
      render();
    });
  }
}

// ── Scene tab switching ──
document.querySelectorAll('.scene-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const n = tab.dataset.scene;
    currentScene = n;
    // Set state per scene
    if (n === '1') { currentTab = 'subagents'; selectedTask = null; workflowDetailView = false; }
    if (n === '2') { currentTab = 'subagents'; selectedTask = 'subagent-jwt'; workflowDetailView = false; }
    if (n === '3') { currentTab = 'workflows'; selectedTask = 'agent-tester'; workflowDetailView = true; }
    if (n === '4') { currentTab = 'subagents'; selectedTask = null; workflowDetailView = false; }
    render();
  });
});

// ── SegmentedTab switching ──
document.getElementById('seg-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.seg-tab');
  if (!tab) return;
  currentTab = tab.dataset.tab;
  // When switching tabs, deselect task and reset workflow view
  selectedTask = null;
  workflowDetailView = false;
  render();
});

// ── Initial render ──
render();
</script>

</body>
</html>

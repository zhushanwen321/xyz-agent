<h2>快速排序算法实现</h2>
<p>快速排序（QuickSort）是一种高效的排序算法，平均时间复杂度为 <strong>O(n log n)</strong>。它的核心思想是<em>分治法</em>：</p>
<ol>
<li>选择一个基准元素（pivot）</li>
<li>将小于基准的放左边，大于基准的放右边</li>
<li>递归地对左右两部分排序</li>
</ol>

<div class="code-header"><span>python</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div>
<pre><code>def quicksort(arr: list[int]) -> list[int]:
    if len(arr) <= 1:
        return arr

    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]

    return quicksort(left) + middle + quicksort(right)</code></pre>

<h3>性能对比</h3>
<table>
<thead>
<tr><th>算法</th><th>平均</th><th>最坏</th><th>空间</th><th>稳定</th></tr>

<tr><td>MergeSort</td><td>O(n log n)</td><td>O(n log n)</td><td>O(n)</td><td>是</td></tr>
<tr><td>HeapSort</td><td>O(n log n)</td><td>O(n log n)</td><td>O(1)</td><td>否</td></tr>

<p>下面是算法流程的 Mermaid 图示：</p>

<div class="mermaid-container">
<pre class="mermaid">
graph TD
    A[输入数组] --> B{长度 ≤ 1?}
    B -- 是 --> C[返回数组]
    B -- 否 --> D[选择 Pivot]
    D --> E[分区: 小 / 等 / 大]
    E --> F[递归排序左侧]
    E --> G[递归排序右侧]
    F --> H[合并结果]
    G --> H
    H --> I[返回排序数组]
</pre>
</div>

<h3>数学公式</h3>
<p>平均比较次数的递推关系：</p>
<div class="math-block">$$T(n) = 2T\\left(\\frac{n}{2}\\right) + O(n)$$</div>

<p>由主定理可得 <em>T(n) = O(n log n)</em>。行内公式如 $E = mc^2$ 和 $\\sum_{i=1}^{n} i = \\frac{n(n+1)}{2}$ 也能正常渲染。</p>

function renderContent() {
  document.getElementById('github-content').innerHTML = aiContent;
  document.getElementById('notion-content').innerHTML = aiContent;
  document.getElementById('prose-content').innerHTML = aiContent;

  // Render KaTeX
  document.querySelectorAll('.math-block').forEach(el => {
    const tex = el.textContent.replace(/^\$\$/, '').replace(/\$\$$/, '').trim();
    try {
      katex.render(tex, el, { displayMode: true, throwOnError: false });
    } catch(e) { el.textContent = tex; }
  });

  // Render inline math
  document.querySelectorAll('.math-inline').forEach(el => {
    const tex = el.textContent.replace(/^\$/, '').replace(/\$$/, '').trim();
    try {
      katex.render(tex, el, { displayMode: false, throwOnError: false });
    } catch(e) {}
  });

  // Render Mermaid
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: true, securityLevel: 'sandbox', theme: document.body.classList.contains('dark') ? 'dark' : 'default' });
  }
}

function copyCode(btn) {
  const code = btn.closest('.code-header').nextElementSibling.querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = '已复制!';
  setTimeout(() => btn.textContent = '复制', 1500);
}

function setTheme(theme) {
  document.body.classList.toggle('dark', theme === 'dark');
  document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const lightSheet = document.getElementById('hljs-light');
  const darkSheet = document.getElementById('hljs-dark');
  if (theme === 'dark') {
    lightSheet.disabled = true;
    darkSheet.disabled = false;
  } else {
    lightSheet.disabled = false;
    darkSheet.disabled = true;
  }
}

window.addEventListener('DOMContentLoaded', renderContent);
</script>

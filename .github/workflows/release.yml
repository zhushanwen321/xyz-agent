name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 三平台并行构建 ──────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Install electron-builder dependencies
        working-directory: src-electron
        run: npm install

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        shell: bash
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/renderer
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/runtime
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/shared

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: |
          npm -w @xyz-agent/frontend run typecheck
          npm -w @xyz-agent/runtime run typecheck
          npm -w @xyz-agent/shared run typecheck

      - name: Test
        continue-on-error: true  # TODO: fix event-adapter/statusline tests, remove this
        run: |
          npm -w @xyz-agent/runtime run test
          npm -w @xyz-agent/frontend run test

      - name: Download and prepare pi resources
        shell: bash
        env:
          PI_VERSION: '0.75.5-xyz-0.1'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/prepare-pi-resources.sh
          ./scripts/prepare-pi-resources.sh "$PI_VERSION"

      - name: Build
        working-directory: src-electron
        env:
          # 跳过 macOS 代码签名（未配置 Apple Developer 证书）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: Postbuild validation
        shell: bash
        run: bash scripts/postbuild-validate.sh --ci

      - name: Runtime smoke test (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          APP_PATH="src-electron/dist/builder-output/mac-arm64/xyz-agent.app"
          RUNTIME="$APP_PATH/Contents/Resources/app.asar.unpacked/dist/runtime/index.cjs"
          ELECTRON="$APP_PATH/Contents/MacOS/xyz-agent"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          # Start runtime with ELECTRON_RUN_AS_NODE, verify it listens
          PORT=3299
          ELECTRON_RUN_AS_NODE=1 "$ELECTRON" "$RUNTIME" --port=$PORT &
          PID=$!
          READY=false
          for i in $(seq 1 20); do
            if curl -s --max-time 1 "http://127.0.0.1:$PORT/health" 2>/dev/null | grep -q ok; then
              READY=true; break
            fi
            sleep 0.5
          done
          kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
          if [ "$READY" != true ]; then
            echo '::error::Runtime smoke test failed — did not respond to /health'
            exit 1
          fi
          echo 'Runtime smoke test passed'

      - name: Runtime smoke test (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          RUNTIME="src-electron/dist/builder-output/win-unpacked/resources/app.asar.unpacked/dist/runtime/index.cjs"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          echo 'Runtime bundle exists in unpacked directory'

      - name: Runtime smoke test (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          RUNTIME="src-electron/dist/builder-output/linux-unpacked/resources/app.asar.unpacked/dist/runtime/index.cjs"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          echo 'Runtime bundle exists in unpacked directory'

      - name: List build output
        shell: bash
        working-directory: src-electron
        run: find dist/builder-output -type f 2>/dev/null || echo 'No output directory'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyz-agent-${{ matrix.platform }}
          path: |
            src-electron/dist/builder-output/*.dmg
            src-electron/dist/builder-output/*.zip
            src-electron/dist/builder-output/*.exe
            src-electron/dist/builder-output/*.AppImage
            src-electron/dist/builder-output/*.deb
          retention-days: 7
          if-no-files-found: error

  # ── 汇总产物，创建 GitHub Release ──────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Read version
        id: changelog
        run: |
          VERSION=$(node -p "require('./src-electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          # Check if release notes file was uploaded as artifact
          if [[ -f release-artifacts/release-notes.md ]]; then
            echo "body=$(cat release-artifacts/release-notes.md)" >> "$GITHUB_OUTPUT"
          else
            # Fallback: generate from conventional commits
            if [ -n "$LAST_TAG" ]; then
              LOG_RANGE="$LAST_TAG..HEAD"
            else
              LOG_RANGE="HEAD~20..HEAD"
            fi

            EXCLUDE_PATTERN="^ci:|^chore:|^refactor:|^docs:|^test:|^style:|^build:"

            extract_commits() {
              local prefix="$1"
              git log "$LOG_RANGE" --pretty=format:"%s" --no-merges --grep="^${prefix}" \
                | grep -Ev "${EXCLUDE_PATTERN}" || true
            }

            strip_prefix() {
              sed "s/^[a-zA-Z0-9()\\-]*:[[:space:]]*//" | sed 's/^/- /'
            }

            breaking=$(git log "$LOG_RANGE" --pretty=format:"%s" --no-merges --grep="breaking" | grep -Ev "${EXCLUDE_PATTERN}" || true)
            feats=$(extract_commits "feat" | strip_prefix)
            fixes=$(extract_commits "fix" | strip_prefix)
            perfs=$(extract_commits "perf" | strip_prefix)

            {
              echo "body<<EOF"
              echo "## What's Changed"
              echo ""
              if [ -n "$breaking" ]; then echo "### Breaking Changes"; echo "$breaking" | sed 's/^/- /'; echo ""; fi
              if [ -n "$feats" ]; then echo "### Features"; echo "$feats"; echo ""; fi
              if [ -n "$fixes" ]; then echo "### Bug Fixes"; echo "$fixes"; echo ""; fi
              if [ -n "$perfs" ]; then echo "### Performance"; echo "$perfs"; echo ""; fi
              if [ -z "$feats" ] && [ -z "$fixes" ] && [ -z "$perfs" ] && [ -z "$breaking" ]; then echo "- Initial release"; echo ""; fi
              if [ -n "$LAST_TAG" ]; then echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${VERSION}"; fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: xyz-agent v${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

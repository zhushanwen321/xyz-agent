name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 三平台并行构建 ──────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifacts: 'src-electron/dist/builder-output/*.dmg src-electron/dist/builder-output/*.zip'
          - os: windows-latest
            platform: win
            artifacts: 'src-electron/dist/builder-output/*.exe'
          - os: ubuntu-latest
            platform: linux
            artifacts: 'src-electron/dist/builder-output/*.AppImage src-electron/dist/builder-output/*.deb'

    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Install electron-builder dependencies
        working-directory: src-electron
        run: npm install

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        shell: bash
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/renderer
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/sidecar
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/shared

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: |
          npm -w @xyz-agent/frontend run typecheck
          npm -w @xyz-agent/sidecar run typecheck
          npm -w @xyz-agent/shared run typecheck

      - name: Test
        run: |
          npm -w @xyz-agent/sidecar run test
          npm -w @xyz-agent/frontend run test

      - name: Build
        working-directory: src-electron
        env:
          # 跳过 macOS 代码签名（未配置 Apple Developer 证书）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyz-agent-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          retention-days: 7
          if-no-files-found: error

  # ── 汇总产物，创建 GitHub Release ──────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=$(node -p "require('./src-electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log -20 --pretty=format:"- %s (%h)" --no-merges)
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="- Initial release"
          fi

          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGES"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${VERSION}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: xyz-agent v${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

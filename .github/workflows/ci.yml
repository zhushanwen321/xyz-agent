name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.xyz-harness/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.xyz-harness/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # pnpm workspace 单步安装：根 + packages/* + apps/* 一次装完
      # （迁移自 npm 双步安装——旧结构 src-electron 是独立 npm project 需要二次 install）
      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      - name: TypeCheck - renderer
        run: pnpm --filter @xyz-agent/frontend run typecheck

      - name: TypeCheck - runtime
        run: pnpm --filter @xyz-agent/runtime run typecheck

      - name: TypeCheck - shared
        run: pnpm --filter @xyz-agent/shared run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      - name: Test - runtime
        run: pnpm --filter @xyz-agent/runtime run test -- --reporter=junit --outputFile=test-results.xml

      - name: Test - renderer
        run: pnpm --filter @xyz-agent/frontend run test -- --reporter=junit --outputFile=test-results.xml

      - name: Test - main
        run: pnpm --filter @xyz-agent/electron run test:main

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/runtime/test-results.xml
            packages/renderer/test-results.xml
          retention-days: 7

  # PR 构建检查：完整 electron-builder 打包流程（与 release 一致），不在 PR 上传产物。
  # needs gate：lint/typecheck/test 已知失败时不浪费 mac runner（mac 构建 5-8min）。
  build:
    name: Build
    needs: [lint, typecheck, test]
    uses: ./.github/workflows/build.yml
    with:
      upload-artifacts: false

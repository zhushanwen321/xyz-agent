name: Build

# Reusable workflow：封装 Electron 完整打包流程。
# 由 ci.yml（PR 验证）和 release.yml（发版出产物）调用。
# 验证深度 = release 验证深度，避免两份 build 逻辑漂移（AGENTS §4 冲突表面化）。

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: '上传 DMG/EXE/AppImage 等产物（release 调用传 true，CI 验证传 false）'
        required: false
        type: boolean
        default: false
      version:
        description: '版本号（仅 release workflow_dispatch 用，留空用 package.json 现值）'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      # pnpm workspace 单步安装：根 + packages/* + apps/* 一次装完
      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      # 缓存 Electron 二进制（~100MB），避免每次 CI 都从 GitHub releases 重新下载。
      # pnpm store 缓存（上方 setup-node 的 cache: pnpm）只覆盖包的 JS 文件，不含 electron
      # postinstall 下载到 node_modules/electron/dist 的二进制，需独立缓存。
      # install.js 会校验缓存内容的 sha256，版本升级不会用到错的旧二进制。
      # key 基于 apps/electron/package.json，electron 版本号变动时自动失效重建。
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('apps/electron/package.json') }}

      # install 步骤跳过了 electron 二进制下载（节省时间），打包需要二进制，显式补回。
      # node-linker=hoisted（见 .npmrc）：electron 被提升到根 node_modules，
      # 不在 apps/electron/node_modules 下，所以必须从仓库根执行 install.js。
      - name: Download Electron binary
        run: node node_modules/electron/install.js

      - name: Bump version
        if: inputs.version != ''
        shell: bash
        run: |
          # pnpm 递归 version：更新所有 workspace 包的版本（apps/electron + packages/*）
          # ELECTRON_SKIP_BINARY_DOWNLOAD 避免触发 electron 二进制下载
          pnpm --filter @xyz-agent/electron version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @xyz-agent/frontend version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @xyz-agent/runtime version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @xyz-agent/shared version ${{ inputs.version }} --no-git-tag-version

      - name: Preflight check
        shell: bash
        run: bash scripts/preflight-check.sh --ci

      - name: Download and prepare pi resources
        shell: bash
        env:
          PI_VERSION: '0.80.3'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/prepare-pi-resources.sh
          ./scripts/prepare-pi-resources.sh "$PI_VERSION"

      - name: Build
        env:
          # 跳过 macOS 代码签名（未配置 Apple Developer 证书）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm --filter @xyz-agent/electron run build

      - name: Postbuild validation
        shell: bash
        run: bash scripts/postbuild-validate.sh --ci

      - name: Runtime smoke test (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          APP_PATH="apps/electron/dist/builder-output/mac-arm64/xyz-agent.app"
          RUNTIME="$APP_PATH/Contents/Resources/app.asar.unpacked/dist/runtime/index.cjs"
          ELECTRON="$APP_PATH/Contents/MacOS/xyz-agent"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          # Start runtime with ELECTRON_RUN_AS_NODE, verify it listens
          PORT=3299
          ELECTRON_RUN_AS_NODE=1 "$ELECTRON" "$RUNTIME" --port=$PORT &
          PID=$!
          READY=false
          for i in $(seq 1 20); do
            if curl -s --max-time 1 "http://127.0.0.1:$PORT/health" 2>/dev/null | grep -q ok; then
              READY=true; break
            fi
            sleep 0.5
          done
          kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
          if [ "$READY" != true ]; then
            echo '::error::Runtime smoke test failed — did not respond to /health'
            exit 1
          fi
          echo 'Runtime smoke test passed'

      - name: Runtime smoke test (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $runtime = "apps/electron/dist/builder-output/win-unpacked/resources/app.asar.unpacked/dist/runtime/index.cjs"
          $electron = "apps/electron/dist/builder-output/win-unpacked/xyz-agent.exe"
          if (-not (Test-Path $runtime)) { throw "Runtime bundle not found in app.asar.unpacked" }
          if (-not (Test-Path $electron)) { throw "Electron executable not found" }
          $port = 3299
          $env:ELECTRON_RUN_AS_NODE = '1'
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = (Resolve-Path $electron).Path
          $psi.ArgumentList.Add((Resolve-Path $runtime).Path)
          $psi.ArgumentList.Add("--port=$port")
          $psi.UseShellExecute = $false
          # 不重定向 stderr/stdout — GitHub Actions 没有 inherited console 概念，
          # 直接让进程写到 CI 捕获流即可（避免管道满 buffer 阻塞 runtime，
          # 也避开 PowerShell add_ErrorDataReceived 在无 runspace 的工作线程上崩）。
          $psi.RedirectStandardError = $false
          $psi.RedirectStandardOutput = $false
          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $psi
          if (-not $process.Start()) { throw 'Failed to start Electron runtime' }
          $ready = $false
          try {
            for ($i = 0; $i -lt 20; $i++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:$port/health" -TimeoutSec 1
                if ($health.ok -eq $true -or $health.status -eq 'ok') { $ready = $true; break }
              } catch { Start-Sleep -Milliseconds 500 }
            }
          } finally {
            if (-not $process.HasExited) {
              & taskkill.exe /PID $process.Id /T /F 2>&1 | Out-Host
              if (-not $process.WaitForExit(5000)) {
                Write-Host "Process did not exit after taskkill"
              }
            }
          }
          if (-not $ready) { throw "Runtime smoke test failed — did not respond to /health" }
          Write-Host 'Runtime smoke test passed'

      - name: Runtime smoke test (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          RUNTIME="apps/electron/dist/builder-output/linux-unpacked/resources/app.asar.unpacked/dist/runtime/index.cjs"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          echo 'Runtime bundle exists in unpacked directory'

      - name: List build output
        shell: bash
        working-directory: apps/electron
        run: find dist/builder-output -type f 2>/dev/null || echo 'No output directory'

      - name: Upload artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyz-agent-${{ matrix.platform }}
          path: |
            apps/electron/dist/builder-output/*.dmg
            apps/electron/dist/builder-output/*.zip
            apps/electron/dist/builder-output/*.exe
            apps/electron/dist/builder-output/*.AppImage
            apps/electron/dist/builder-output/*.deb
          retention-days: 7
          if-no-files-found: error

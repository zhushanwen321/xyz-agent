name: Build

# Reusable workflow：封装 Electron 完整打包流程。
# 由 ci.yml（PR 验证）和 release.yml（发版出产物）调用。
# 验证深度 = release 验证深度，避免两份 build 逻辑漂移（AGENTS §4 冲突表面化）。

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: '上传 DMG/AppImage 等产物（release 调用传 true，CI 验证传 false）'
        required: false
        type: boolean
        default: false
      version:
        description: '版本号（仅 release workflow_dispatch 用，留空用 package.json 现值）'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          # TODO(Windows): runtime-manager 进程管理依赖 Unix 命令（pgrep/lsof/ps/SIGTERM），
          # Windows 上 stop() 无法清理 pi 子进程。等 platform 层抽象完成后再启用。
          # - os: windows-latest
          #   platform: win
          - os: ubuntu-latest
            platform: linux

    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install root npm dependencies
        run: npm ci

      # src-electron/ 是独立 npm project（有自己的 package-lock，不在根 workspaces 里）。
      # 根 npm ci 装不到 electron / electron-builder / @vitejs/plugin-vue / @lucide/vue，
      # 它们都 hoist 到 src-electron/node_modules。这步缺失 = TypeCheck/Test/Build 全 fail。
      - name: Install src-electron dependencies
        working-directory: src-electron
        run: npm ci

      - name: Bump version
        if: inputs.version != ''
        shell: bash
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/renderer
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/runtime
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=src-electron/shared

      - name: Preflight check
        shell: bash
        run: bash scripts/preflight-check.sh --ci

      - name: Download and prepare pi resources
        shell: bash
        env:
          PI_VERSION: '0.80.3'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/prepare-pi-resources.sh
          ./scripts/prepare-pi-resources.sh "$PI_VERSION"

      - name: Build
        working-directory: src-electron
        env:
          # 跳过 macOS 代码签名（未配置 Apple Developer 证书）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: Postbuild validation
        shell: bash
        run: bash scripts/postbuild-validate.sh --ci

      - name: Runtime smoke test (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          APP_PATH="src-electron/dist/builder-output/mac-arm64/xyz-agent.app"
          RUNTIME="$APP_PATH/Contents/Resources/app.asar.unpacked/dist/runtime/index.cjs"
          ELECTRON="$APP_PATH/Contents/MacOS/xyz-agent"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          # Start runtime with ELECTRON_RUN_AS_NODE, verify it listens
          PORT=3299
          ELECTRON_RUN_AS_NODE=1 "$ELECTRON" "$RUNTIME" --port=$PORT &
          PID=$!
          READY=false
          for i in $(seq 1 20); do
            if curl -s --max-time 1 "http://127.0.0.1:$PORT/health" 2>/dev/null | grep -q ok; then
              READY=true; break
            fi
            sleep 0.5
          done
          kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
          if [ "$READY" != true ]; then
            echo '::error::Runtime smoke test failed — did not respond to /health'
            exit 1
          fi
          echo 'Runtime smoke test passed'

      - name: Runtime smoke test (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          RUNTIME="src-electron/dist/builder-output/linux-unpacked/resources/app.asar.unpacked/dist/runtime/index.cjs"
          if [ ! -f "$RUNTIME" ]; then
            echo '::error::Runtime bundle not found in app.asar.unpacked'
            exit 1
          fi
          echo 'Runtime bundle exists in unpacked directory'

      - name: List build output
        shell: bash
        working-directory: src-electron
        run: find dist/builder-output -type f 2>/dev/null || echo 'No output directory'

      - name: Upload artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyz-agent-${{ matrix.platform }}
          path: |
            src-electron/dist/builder-output/*.dmg
            src-electron/dist/builder-output/*.zip
            src-electron/dist/builder-output/*.exe
            src-electron/dist/builder-output/*.AppImage
            src-electron/dist/builder-output/*.deb
          retention-days: 7
          if-no-files-found: error

name: Release NPM

# npm 包发布（与 Electron 打包 release.yml 解耦）
#
# 触发方式：
#   1. push tag `npm-v*` — 正式发布
#   2. workflow_dispatch — 手动触发
#
# 注意：Electron 打包走 `v*` tag 前缀（release.yml），npm 走 `npm-v*`，两套互不干扰。

on:
  push:
    tags:
      - 'npm-v*'
  workflow_dispatch:

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # 只在 tag 推送或手动触发时运行（不在 PR 中运行）
    if: startsWith(github.ref, 'refs/tags/npm-v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build extension-protocol
        run: pnpm --filter @xyz-agent/extension-protocol build

      - name: Publish to npm
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## NPM Publish Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`@xyz-agent/extension-protocol\` to npm." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Verify: https://www.npmjs.com/package/@xyz-agent/extension-protocol" >> "$GITHUB_STEP_SUMMARY"

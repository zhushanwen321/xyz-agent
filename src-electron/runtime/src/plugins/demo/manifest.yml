# Demo Plugin Manifest (reference — registry reads package.json at runtime)
# This file documents the plugin metadata in a human-friendly format.
name: demo-plugin
version: 0.1.0
description: Demo plugin showcasing xyz-agent plugin API (session, storage, hooks, tools, UI)
trustLevel: sandbox
activationEvents:
  - onStartupFinished
contributes:
  tools:
    - name: demo_search
      description: Search for files matching a pattern
      parameters:
        type: object
        properties:
          pattern:
            type: string
            description: Glob pattern to search
        required:
          - pattern
  hooks:
    - onBeforeSendMessage
permissions:
  - workspace:file:search

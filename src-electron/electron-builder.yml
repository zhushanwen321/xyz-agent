appId: com.xyz-agent.app
productName: xyz-agent
directories:
  output: dist/builder-output
asar: true
files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/runtime/**/*   # asarUnpack 的前提：files 必须先包含，才能 unpack
  - renderer/dist/**/*
  - package.json
  # ══════════════════════════════════════════════════════════════
  # files 规则（违反导致打包膨胀或缺文件）
  # ──────────────────────────────────────────────────────────────
  # 只打包主进程直接 require 的包；其余已被 tsup bundle 进 runtime
  # 新增主进程依赖时必须同步更新此列表
  # 检查：scripts/preflight-check.sh
  # ══════════════════════════════════════════════════════════════
  - node_modules/electron-store/**/*
  - node_modules/is-glob/**/*
  - node_modules/markdown-it-footnote/**/*
  - node_modules/@types/markdown-it-footnote/**/*
  # 排除
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.ts"
  # 警告：asarUnpack 只作用于已被 files 包含的文件。
  # 如果在此排除 dist/runtime，asarUnpack 将无文件可解压，
  # 导致打包产物中缺失整个 runtime，应用启动即崩溃。
  # 历史回归：2026-05-31 因添加 '!dist/runtime/**/*' 导致 0.3.8 DMG 无法启动。
  - "!dist/builder-output/**/*"

# runtime 预编译产物必须排除在 asar 之外，
# 因为 Node.js 子进程无法直接读取 asar 内的文件。
# 关键约束：asarUnpack 只作用于已被 files 包含的文件。
# dist/runtime 必须在 files 中存在，然后 asarUnpack 会把它从 asar
# 中剔除到 app.asar.unpacked/ 目录。如果 files 排除了 dist/runtime，
# 这里只会静默失败，产物中不会有 app.asar.unpacked/dist/runtime/。
# 检查：scripts/preflight-check.sh [5/7] asarUnpack vs files consistency
asarUnpack:
  - "dist/runtime/**/*"

# pi Bun binary + bundled agent (extensions + skills)
# from 路径相对于 src-electron/（electron-builder 的工作目录）
extraResources:
  - from: resources/pi
    to: pi
    filter:
      - "**/*"
      - "!**/*.tar.gz"
      - "!**/*.zip"
  # @zhushanwen/pi-* npm extension packages + transitive deps
  # runtime 进程 cwd = Resources/，scanNpmExtensions 从 cwd/node_modules/@zhushanwen/ 扫描
  - from: node_modules/@zhushanwen
    to: node_modules/@zhushanwen
  - from: node_modules/js-yaml
    to: node_modules/js-yaml
  - from: node_modules/argparse
    to: node_modules/argparse
  # xyz-agent pi extension (xyz-navigate command)
  # 源文件在 repo root，打包到 Resources 根目录
  - from: ../xyz-agent-extension.js
    to: xyz-agent-extension.js

# NOTE: macos-latest 是 arm64 runner，无法交叉编译 x64。
# 如需 Intel Mac 支持，追加 macos-13 (Intel) 或配置 universal。
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.developer-tools
  minimumSystemVersion: 12.0.0

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: ${name}-${version}-setup-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  artifactName: ${name}-${version}-${os}-${arch}.${ext}

# 本地构建时 electron-builder 需要至少一个 publish provider
# 否则 updateInfoBuilder 会因 channel === null 崩溃
# CI release workflow 会覆盖此配置
publish:
  provider: generic
  url: https://localhost/local-only
